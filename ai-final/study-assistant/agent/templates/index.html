<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Study Assistant</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📚</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="background">
        <div class="container" role="main">

            <!-- Header -->
            <header class="header" role="banner">
                <div class="header-content">
                    <span class="header-icon" aria-hidden="true">📚</span>
                    <div class="header-text">
                        <h1 class="header-title">Personal Study Assistant</h1>
                        <p class="header-subtitle">Powered by Microsoft Foundry</p>
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-container" role="region" aria-label="Chat conversation area">
                <div class="chat-toolbar" role="toolbar" aria-label="Chat controls">
                    <!-- Mode toggle -->
                    <div class="mode-toggle" role="group" aria-label="Agent mode">
                        <button id="modeOnlineBtn" class="mode-btn active"
                            data-mode="online" title="Use Foundry-hosted agent (requires Azure login)"
                            aria-pressed="true" tabindex="4">
                            ☁️ Online
                        </button>
                        <button id="modeOfflineBtn" class="mode-btn"
                            data-mode="offline" title="Use local model (Ollama / LM Studio)"
                            aria-pressed="false" tabindex="5">
                            💻 Offline
                        </button>
                    </div>

                    <button id="resetBtn" class="reset-btn"
                        title="Start a new study session"
                        aria-label="New session" tabindex="3">
                        <span aria-hidden="true">🔄</span>
                        <span class="reset-label">New Session</span>
                    </button>
                </div>
                <div id="chatMessages" class="chat-messages" role="log"
                    aria-live="polite" aria-atomic="false" aria-label="Chat messages">
                    <div class="welcome-message" role="status">
                        Ask me to fetch a URL, generate a quiz, or review your progress!
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container" role="form" aria-label="Message input form">
                <!-- Hidden file input — triggered by the upload button -->
                <input type="file" id="pdfInput" accept=".pdf"
                    class="sr-only" aria-label="Choose a PDF file to upload">

                <button id="uploadBtn" class="upload-btn" title="Upload a PDF document"
                    aria-label="Upload PDF" tabindex="2">
                    <span aria-hidden="true">📎</span>
                </button>

                <label for="messageInput" class="sr-only">Type your message</label>
                <input type="text" id="messageInput" class="message-input"
                    placeholder="Type a message or upload a PDF with 📎"
                    autocomplete="off"
                    aria-label="Message input field"
                    aria-describedby="inputHelp"
                    tabindex="1" maxlength="10000">
                <button id="sendBtn" class="send-btn" title="Send message"
                    aria-label="Send message" tabindex="3">
                    <span aria-hidden="true">➤</span>
                </button>
            </div>

            <!-- Footer -->
            <footer class="footer" role="contentinfo">
                <span id="inputHelp">AI-generated content can include mistakes</span>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
